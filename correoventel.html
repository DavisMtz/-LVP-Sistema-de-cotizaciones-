    <script>
        window.__APP__ = { baseUrl: <?!= JSON.stringify(baseUrl) ?>, folio: <?!= JSON.stringify(folio) ?>, format: <?!= JSON.stringify(format) ?> };

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        if (!requireSession()) return;

        // --- Elementos del DOM ---
        const searchQuoteForm = document.getElementById('searchQuoteForm');
        const folioInput = document.getElementById('folioInput');
        const searchQuoteButton = document.getElementById('searchQuoteButton');
        const quoteDataStatus = document.getElementById('quote-data-status');
        const step1Chip = document.getElementById('step1-chip');

        const emailForm = document.getElementById('emailForm');
        const emailFields = document.getElementById('email-fields');
        const recipientInput = document.getElementById('recipient');
        const subjectInput = document.getElementById('subject');
        const bodyInput = document.getElementById('body');
        const sendButton = document.getElementById('sendButton');
        const viewQuoteButton = document.getElementById('viewQuoteButton');
        const backButton = document.getElementById('backButton');
        const alertContainer = document.getElementById('alert-container');
        const formatSelect = document.getElementById('formatSelect');
        const formatHint = document.getElementById('formatHint');

        let loadedQuoteData = null;

        // Tolerancia a despliegues parciales: si el app_core cargado aún no trae
        // AppCache, la pantalla funciona igual, solo sin caché local.
        const Cache = window.AppCache || { get: () => null, set: () => {}, remove: () => {}, ageLabel: () => '' };

        // El folio y el formato pueden venir de otra pantalla por la URL; si no,
        // se usa lo que se guardó con la cotización.
        const urlFolio = AppUrl.param('folio');
        const urlFormat = AppUrl.param('format');

        /**
         * Llena el selector con los formatos habilitados y preselecciona el indicado.
         */
        let formatChangeWired = false;
        const renderFormats = (response, preferredId) => {
            if (!response || !response.success || !response.formats || response.formats.length === 0) {
                formatSelect.innerHTML = '<option value="">Sin formatos disponibles</option>';
                formatHint.textContent = 'No hay formatos habilitados. Revisa el panel de administración o los registros del script.';
                return;
            }

            const chosen = response.formats.some(f => f.id === preferredId)
                ? preferredId
                : response.defaultId;

            formatSelect.innerHTML = response.formats
                .map(f => `<option value="${f.id}" ${f.id === chosen ? 'selected' : ''}>${f.name}</option>`)
                .join('');

            const describe = () => {
                const match = response.formats.find(f => f.id === formatSelect.value);
                formatHint.textContent = match ? match.description : '';
            };
            describe();
            if (!formatChangeWired) {
                formatSelect.addEventListener('change', describe);
                formatChangeWired = true;
            }
        };

        const loadEmailFormats = (preferredId) => {
            // Los formatos casi no cambian: se pintan al instante desde la caché local
            // y se revalidan en segundo plano contra el servidor.
            const cached = Cache.get('formats');
            if (cached && cached.data) renderFormats(cached.data, preferredId);

            google.script.run
                .withSuccessHandler(response => {
                    if (response && response.success) Cache.set('formats', response);
                    renderFormats(response, formatSelect.value || preferredId);
                })
                .withFailureHandler(error => {
                    if (cached && cached.data) return; // Ya hay opciones pintadas desde caché.
                    formatSelect.innerHTML = '<option value="">Error al cargar formatos</option>';
                    formatHint.textContent = 'Error al cargar los formatos: ' + error.message;
                })
                .getEnabledQuoteFormats();
        };

        // --- Remitente visible: el asesor sabe desde qué correo saldrá el envío. ---
        const senderInfoText = document.getElementById('senderInfoText');
        const loadSenderInfo = () => {
            const cached = Cache.get('sender-info', 30 * 60 * 1000);
            const paint = (info) => {
                if (!info || !senderInfoText) { if (senderInfoText) senderInfoText.textContent = ''; return; }
                senderInfoText.innerHTML = info.aliasAvailable
                    ? `El correo saldrá desde <strong>${info.alias}</strong> y las respuestas del cliente llegarán a tu correo.`
                    : `El correo saldrá desde la cuenta del sistema (el alias <strong>${info.alias}</strong> aún no está configurado). Las respuestas llegarán a tu correo.`;
            };
            if (cached) { paint(cached.data); return; }
            google.script.run
                .withSuccessHandler(info => { if (info) { Cache.set('sender-info', info); paint(info); } })
                .withFailureHandler(() => { if (senderInfoText) senderInfoText.textContent = ''; })
                .getMailSenderInfo();
        };
        // Si el servidor aún no trae getMailSenderInfo (despliegue viejo), esto no debe
        // detener el resto de la pantalla.
        try { loadSenderInfo(); } catch (e) { console.warn('Info de remitente no disponible:', e); }

        // --- Funciones de UI ---
        const setButtonLoadingState = (button, isLoading, text = 'Cargando...') => {
            if (!button) return;
            const textEl = button.querySelector('.button-text');
            const iconEl = button.querySelector('.button-icon');

            if (isLoading) {
                if (textEl && !button.dataset.originalText) button.dataset.originalText = textEl.textContent;
                if (iconEl && !button.dataset.originalIcon) button.dataset.originalIcon = iconEl.innerHTML;

                if (textEl) textEl.textContent = text;
                if (iconEl) iconEl.innerHTML = '<div class="v-spinner"></div>';
                button.disabled = true;
            } else {
                if (textEl && button.dataset.originalText) textEl.textContent = button.dataset.originalText;
                if (iconEl && button.dataset.originalIcon) iconEl.innerHTML = button.dataset.originalIcon;
                button.disabled = false;
            }
        };

        const showAlert = (message, type = 'success') => {
            AppMotion.toast(message, type === 'success' ? 'ok' : 'error');
        };

        const resetForm = () => {
            emailFields.disabled = true;
            sendButton.disabled = true;
            viewQuoteButton.disabled = true;
            emailForm.reset();
            folioInput.value = '';
            quoteDataStatus.classList.add('hidden');
            step1Chip.classList.remove('done');
            step1Chip.textContent = '1';
            loadedQuoteData = null;
        };

        // --- Lógica Principal ---
        const handleSearchQuote = (e) => {
            if (e && e.preventDefault) e.preventDefault();
            const folio = folioInput.value.trim();
            if (!folio) {
                showAlert("Por favor, ingresa un número de folio.", "error");
                AppMotion.shake(folioInput);
                return;
            }

            setButtonLoadingState(searchQuoteButton, true, 'Buscando...');
            quoteDataStatus.classList.add('hidden');

            google.script.run
                .withSuccessHandler(response => {
                    setButtonLoadingState(searchQuoteButton, false);
                    if (response.success) {
                        loadedQuoteData = response.data;
                        quoteDataStatus.innerHTML = `
                            <span class="font-bold text-green-700">✓ Datos Cargados:</span>
                            Cotización <strong>${loadedQuoteData.folio}</strong> para <strong>${loadedQuoteData.clientName}</strong>.
                        `;
                        quoteDataStatus.classList.remove('hidden');
                        AppMotion.pop(quoteDataStatus);
                        step1Chip.classList.add('done');
                        step1Chip.textContent = '✓';

                        recipientInput.value = loadedQuoteData.clientEmail;
                        subjectInput.value = `Cotización de Servicios Ventel - Folio ${loadedQuoteData.folio}`;
                        bodyInput.value = `Estimado(a) ${loadedQuoteData.clientName},\n\nJunto con saludar, y como seguimiento a nuestra conversación, le hago llegar la cotización solicitada con folio ${loadedQuoteData.folio}.\n\nQuedo a sus órdenes para cualquier duda o aclaración.\n\nSaludos cordiales,`;

                        loadEmailFormats(urlFormat || loadedQuoteData.format);

                        emailFields.disabled = false;
                        sendButton.disabled = false;
                        viewQuoteButton.disabled = false;
                        AppMotion.enter(emailForm);
                    } else {
                        showAlert(response.message, "error");
                        resetForm();
                    }
                })
                .withFailureHandler(error => {
                    setButtonLoadingState(searchQuoteButton, false);
                    showAlert("Error de comunicación al buscar la cotización.", "error");
                    console.error("Error en getQuoteDetailsForEmail:", error);
                })
                .getQuoteDetailsForEmail(folio);
        };

        const handleSendEmail = (e) => {
            e.preventDefault();
            if (!loadedQuoteData || !emailForm.checkValidity()) {
                showAlert("Por favor, completa todos los campos requeridos.", "error");
                return;
            }
            if (!formatSelect.value) {
                showAlert("Elige el formato del PDF antes de enviar.", "error");
                AppMotion.shake(formatSelect);
                return;
            }

            setButtonLoadingState(sendButton, true, 'Enviando...');
            const emailData = {
                to: recipientInput.value,
                subject: subjectInput.value,
                body: bodyInput.value, // El cuerpo del mensaje escrito por el usuario
                folio: loadedQuoteData.folio,
                format: formatSelect.value
            };

            google.script.run
                .withSuccessHandler(response => {
                    setButtonLoadingState(sendButton, false);
                    if (response.success) {
                        const from = response.sentFrom ? ` desde ${response.sentFrom}` : '';
                        showAlert(`Correo del folio ${emailData.folio} enviado${from}.`, "success");
                        resetForm();
                    } else {
                        showAlert(response.message, "error");
                    }
                })
                .withFailureHandler(error => {
                    setButtonLoadingState(sendButton, false);
                    showAlert("Error de comunicación al enviar el correo.", "error");
                    console.error("Error en sendQuoteByEmail:", error);
                })
                .sendQuoteByEmail(emailData);
        };

        // --- Event Listeners ---
        searchQuoteForm.addEventListener('submit', handleSearchQuote);
        emailForm.addEventListener('submit', handleSendEmail);
        backButton.addEventListener('click', (e) => {
            e.preventDefault();
            // Vuelve al inicio que corresponde al rol (dashboard o panel de supervisión).
            AppUrl.goHome();
        });
        viewQuoteButton.addEventListener('click', () => {
            if (!loadedQuoteData) return;
            AppUrl.go('consulta_cotizacion', { folio: loadedQuoteData.folio });
        });

        // --- Auto-búsqueda si se proporciona Folio por la URL ---
        if (urlFolio) {
            folioInput.value = urlFolio;
            handleSearchQuote();
        }
    });
    </script>
</body>
