<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/**
 * =====================================================================================
 * TEMA COMPARTIDO | Sistema de cotizaciones Ventel
 * =====================================================================================
 * Tokens de diseño y componentes comunes. Los formatos de cotización (vista PDF y CCL)
 * NO usan estas clases: conservan su maquetación original intacta.
 */
:root {
  --brand: #E10098;
  --brand-dark: #b8007c;
  --brand-soft: #fdf2f8;
  --ink: #0f172a;
  --ink-soft: #475569;
  --line: #e2e8f0;
  --surface: #ffffff;
  --bg: #f6f7fb;
  --ok: #10b981;
  --warn: #f59e0b;
  --bad: #ef4444;
  --radius: 14px;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, .06), 0 1px 3px rgba(15, 23, 42, .08);
  --shadow-md: 0 10px 30px -12px rgba(15, 23, 42, .18);
  --shadow-brand: 0 10px 24px -10px rgba(225, 0, 152, .45);
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background-color: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Fondo con aurora sutil para pantallas de app (no se imprime) */
.app-aurora {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background:
    radial-gradient(60rem 30rem at 110% -10%, rgba(225, 0, 152, .07), transparent 60%),
    radial-gradient(50rem 28rem at -20% 110%, rgba(109, 40, 217, .07), transparent 60%);
}

/* ---------- Botones ---------- */
.v-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .55rem;
  padding: .65rem 1.15rem;
  border-radius: 10px;
  border: 1px solid transparent;
  font-weight: 600;
  font-size: .875rem;
  line-height: 1.25;
  cursor: pointer;
  white-space: nowrap;
  transition: transform .18s ease, box-shadow .18s ease, background-color .18s ease, color .18s ease, border-color .18s ease;
  box-shadow: var(--shadow-sm);
}
.v-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.v-btn:active:not(:disabled) { transform: translateY(0) scale(.98); }
.v-btn:focus-visible { outline: 3px solid rgba(225, 0, 152, .35); outline-offset: 2px; }
.v-btn:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }
.v-btn svg { width: 1.15em; height: 1.15em; flex: none; }

.v-btn-primary { background: linear-gradient(135deg, var(--brand), #ff2fb4); color: #fff; }
.v-btn-primary:hover:not(:disabled) { box-shadow: var(--shadow-brand); }
.v-btn-dark { background: #1e293b; color: #fff; }
.v-btn-dark:hover:not(:disabled) { background: #0f172a; }
.v-btn-ghost { background: var(--surface); color: var(--ink-soft); border-color: var(--line); }
.v-btn-ghost:hover:not(:disabled) { color: var(--ink); border-color: #cbd5e1; }
.v-btn-success { background: linear-gradient(135deg, #10b981, #0ea968); color: #fff; }
.v-btn-danger { background: var(--bad); color: #fff; }
.v-btn-indigo { background: linear-gradient(135deg, #5850ec, #6d28d9); color: #fff; }
.v-btn-sm { padding: .4rem .75rem; font-size: .8rem; border-radius: 8px; }

/* Acciones de fila en tablas */
.v-row-action {
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  font-weight: 600;
  font-size: .8rem;
  padding: .3rem .55rem;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  transition: background-color .15s ease, transform .15s ease;
}
.v-row-action:hover:not(:disabled) { transform: translateY(-1px); }
.v-row-action:disabled { opacity: .5; cursor: wait; }
.v-row-action svg { width: 1em; height: 1em; }
.v-act-pink { color: var(--brand); } .v-act-pink:hover:not(:disabled) { background: var(--brand-soft); }
.v-act-blue { color: #2563eb; } .v-act-blue:hover:not(:disabled) { background: #eff6ff; }
.v-act-green { color: #047857; } .v-act-green:hover:not(:disabled) { background: #ecfdf5; }
.v-act-slate { color: var(--ink-soft); } .v-act-slate:hover:not(:disabled) { background: #f1f5f9; }

/* ---------- Tarjetas y secciones ---------- */
.v-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.v-card-hover { transition: transform .2s ease, box-shadow .2s ease; }
.v-card-hover:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }

/* ---------- Inputs ---------- */
.v-input, .v-select, .v-textarea {
  width: 100%;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  padding: .6rem .8rem;
  font-size: .875rem;
  background: #fff;
  color: var(--ink);
  transition: border-color .18s ease, box-shadow .18s ease;
  box-sizing: border-box;
}
.v-input:focus, .v-select:focus, .v-textarea:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(225, 0, 152, .18);
}
.v-input:disabled, .v-select:disabled, .v-textarea:disabled { background: #f1f5f9; color: #94a3b8; }
.v-label { display: block; font-size: .8rem; font-weight: 600; color: var(--ink-soft); margin-bottom: .35rem; }

/* ---------- Navbar ---------- */
.v-nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255, 255, 255, .72);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid transparent;
  transition: background-color .3s ease, border-color .3s ease, box-shadow .3s ease;
}
.v-nav.is-scrolled {
  background: rgba(255, 255, 255, .95);
  border-bottom-color: var(--line);
  box-shadow: 0 4px 14px -6px rgba(15, 23, 42, .12);
}

/* ---------- Badges de estatus ---------- */
.v-badge {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  padding: .2rem .65rem;
  border-radius: 999px;
  font-size: .72rem;
  font-weight: 600;
  white-space: nowrap;
}
.v-badge::before { content: ''; width: .42rem; height: .42rem; border-radius: 999px; background: currentColor; opacity: .7; }
.v-badge-green { background: #d1fae5; color: #065f46; }
.v-badge-yellow { background: #fef3c7; color: #92400e; }
.v-badge-red { background: #fee2e2; color: #991b1b; }
.v-badge-blue { background: #dbeafe; color: #1e40af; }
.v-badge-pink { background: #fce7f3; color: #9d174d; }

/* ---------- Spinner ---------- */
.v-spinner {
  display: inline-block;
  width: 1.1em;
  height: 1.1em;
  border: 2px solid currentColor;
  border-right-color: transparent;
  border-radius: 50%;
  animation: v-spin .7s linear infinite;
  flex: none;
}
@keyframes v-spin { to { transform: rotate(360deg); } }

/* ---------- Toast ---------- */
#v-toast-region {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: .5rem;
  max-width: min(24rem, calc(100vw - 2rem));
}
.v-toast {
  display: flex;
  align-items: flex-start;
  gap: .6rem;
  padding: .8rem 1rem;
  border-radius: 12px;
  background: #0f172a;
  color: #fff;
  font-size: .85rem;
  line-height: 1.45;
  box-shadow: var(--shadow-md);
  border-left: 4px solid var(--brand);
}
.v-toast.ok { border-left-color: var(--ok); }
.v-toast.bad { border-left-color: var(--bad); }
.v-toast.warn { border-left-color: var(--warn); }

/* ---------- Modal ---------- */
.v-modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(15, 23, 42, .45);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  padding: 1rem;
}
.v-modal-overlay.active { display: flex; }
.v-modal {
  background: #fff;
  border-radius: 16px;
  padding: 1.6rem;
  width: 100%;
  max-width: 34rem;
  box-shadow: 0 30px 80px -20px rgba(15, 23, 42, .45);
}

/* ---------- Overlay de carga / redirección ---------- */
.v-overlay {
  position: fixed;
  inset: 0;
  z-index: 9998;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  background: rgba(255, 255, 255, .92);
  backdrop-filter: blur(3px);
  transition: opacity .35s ease, visibility .35s ease;
}
.v-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.v-overlay-spinner {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 5px solid #f1f5f9;
  border-top-color: var(--brand);
  animation: v-spin 1.1s cubic-bezier(.5, 0, .5, 1) infinite;
}
.v-overlay-text { font-weight: 600; color: var(--ink-soft); }

/* ---------- Tablas ---------- */
.v-table-wrap { overflow-x: auto; border-radius: var(--radius); }
.v-table { width: 100%; font-size: .85rem; text-align: left; color: var(--ink-soft); border-collapse: collapse; }
.v-table thead th {
  font-size: .7rem;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--ink-soft);
  background: #f8fafc;
  border-bottom: 1px solid var(--line);
  padding: .85rem 1.25rem;
  font-weight: 700;
  white-space: nowrap;
}
.v-table tbody td { padding: .8rem 1.25rem; border-bottom: 1px solid #f1f5f9; }
.v-table tbody tr { background: #fff; transition: background-color .15s ease; }
.v-table tbody tr:hover { background: #fafafa; }

/* ---------- Utilidades ---------- */
.v-kpi-value { font-size: 2rem; font-weight: 800; letter-spacing: -.02em; color: var(--ink); }
[data-animate] { will-change: transform, opacity; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}
</style>
